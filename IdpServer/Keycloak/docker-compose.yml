services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: SuperSecretDBPass123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build: . 
    restart: always
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: SuperSecretDBPass123!
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: AdminStrongPass456!

      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth

      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      
      KC_HOSTNAME_URL: https://public.vocongkhanh.id.vn/auth
      KC_HOSTNAME_BACKCHANNEL_URL: http://127.0.0.1:8080/auth
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"

      # Log
      KC_LOG_LEVEL: "org.keycloak.events:DEBUG,INFO"
      #KC_LOG_LEVEL: INFO
      KC_LOG: console,file
      KC_LOG_CONSOLE_OUTPUT: json
    volumes:
      - keycloak_data:/opt/keycloak/data
      - /var/log/keycloak:/opt/keycloak/data/log
    ports:
      - "8080:8080"                               
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: journald
      options:
        tag: keycloak

volumes:
  postgres_data:
  keycloak_data:

networks:
  internal:
    driver: bridge
